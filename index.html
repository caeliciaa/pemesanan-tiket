<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan Tiket</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        .header {
            position: relative;
            width: 100%;
            height: 250px;
            background: url('waterpark.jpeg') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        .overlay {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }
        .container {
            margin: 20px auto;
            max-width: 600px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            background-color: white;
        }
        h2 {
            margin-bottom: 10px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 10px;
        }
        label {
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: blue;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: darkblue;
        }
        .thankyou {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            margin: 20px auto;
            max-width: 400px;
        }
        .ticket-adult {
            background-color: #b0e0e6;
            padding: 20px;
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
        }
        .ticket-kids {
            background-color: #f5deb3;
            padding: 20px;
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
        }
    </style>
</head>
</html>
